spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  neo4j:
    uri: ${NEO4J_URI}
    authentication:
      username: ${NEO4J_USERNAME}
      password: ${NEO4J_PASSWORD}
    pool:
      max-connection-pool-size: 50
      connection-acquisition-timeout: 30s
      max-connection-lifetime: 1h
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  metrics:
    tags:
      application: rhizodelta

rhizodelta:
  feature:
    observability:
      enabled: ${RHIZODELTA_FEATURE_OBSERVABILITY_ENABLED:true}
    sweeper:
      enabled: ${RHIZODELTA_FEATURE_SWEEPER_ENABLED:false}
    proposal:
      enabled: ${RHIZODELTA_FEATURE_PROPOSAL_ENABLED:false}
    prefers-aggregation:
      enabled: ${RHIZODELTA_FEATURE_PREFERS_AGGREGATION_ENABLED:false}
    prefers-feed-ranking:
      enabled: ${RHIZODELTA_FEATURE_PREFERS_FEED_RANKING_ENABLED:false}
  embedding:
    dimension: 1024
  ai:
    recall:
      top-k: 10
    rerank:
      top-n: 3
    context:
      max-lineage-depth: 2
      max-children-depth: 1
      max-provenance: 5
      max-ancestor-depth: 5
      max-sibling-count: 5
    reflection:
      max-attempts: 2
    summary:
      enabled: true
      max-source-tokens: 4096
    quality:
      enabled: true
      min-content-length: 20
    budget:
      max-prompt-tokens: 8192
      max-latency-ms: 30000
    confidence:
      review-threshold: 0.65
    rules:
      auto-merge-threshold: 0.9
      auto-branch-threshold: 0.3
    models:
      routing:
        base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
        model-name: deepseek-v4-flash
        api-key: ${DASHSCOPE_API_KEY:your-placeholder-key}
      summary:
        base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
        model-name: deepseek-v4-flash
        api-key: ${DASHSCOPE_API_KEY:your-placeholder-key}
      quality:
        base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
        model-name: deepseek-v4-flash
        api-key: ${DASHSCOPE_API_KEY:your-placeholder-key}
    sweeper:
      batch-size: 50
      cron: "0 */30 * * * *"
  jwt:
    secret: ${JWT_SECRET}
    refresh-ttl: ${JWT_REFRESH_TTL:P30D}
  minio:
    enabled: ${MINIO_ENABLED:false}
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${MINIO_SECRET_KEY:minioadmin}
    bucket: ${MINIO_BUCKET:rhizodelta-avatars}

langchain4j:
  open-ai:
    chat-model:
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      model-name: deepseek-v4-flash
      api-key: ${DASHSCOPE_API_KEY:your-placeholder-key}
    embedding-model:
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      model-name: text-embedding-v3
      api-key: ${DASHSCOPE_API_KEY:your-placeholder-key}

# Suppress Tomcat ERROR logs for broken SSE connections (client disconnect).
# These two loggers only fire when a servlet or error page write fails mid-flight,
# which is normal for long-lived SSE streams. WARN and above still pass through.
logging:
  level:
    "org.apache.catalina.core.ContainerBase.[Tomcat].[localhost].[/].[dispatcherServlet]": WARN
    "org.apache.catalina.core.ContainerBase.[Tomcat].[localhost]": WARN
