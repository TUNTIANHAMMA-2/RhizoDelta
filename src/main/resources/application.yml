spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  neo4j:
    uri: ${NEO4J_URI}
    authentication:
      username: ${NEO4J_USERNAME}
      password: ${NEO4J_PASSWORD}
    pool:
      max-connection-pool-size: 50
      connection-acquisition-timeout: 30s
      max-connection-lifetime: 1h

rhizodelta:
  embedding:
    dimension: 1024
  ai:
    recall:
      top-k: 10
    rerank:
      top-n: 3
    context:
      max-lineage-depth: 2
      max-children-depth: 1
      max-provenance: 5
    reflection:
      max-attempts: 2
    summary:
      enabled: true
      max-source-tokens: 4096
    budget:
      max-prompt-tokens: 8192
      max-latency-ms: 30000
    confidence:
      review-threshold: 0.65
    rules:
      auto-merge-threshold: 0.9
      auto-branch-threshold: 0.3
    models:
      routing:
        base-url: https://api.siliconflow.cn/v1
        model-name: Qwen/Qwen2.5-7B-Instruct
        api-key: ${SILICON_FLOW_API_KEY:your-placeholder-key}
      summary:
        base-url: https://api.siliconflow.cn/v1
        model-name: Qwen/Qwen2.5-14B-Instruct
        api-key: ${SILICON_FLOW_API_KEY:your-placeholder-key}
      quality:
        base-url: https://api.siliconflow.cn/v1
        model-name: Qwen/Qwen2.5-7B-Instruct
        api-key: ${SILICON_FLOW_API_KEY:your-placeholder-key}
    sweeper:
      batch-size: 50
      cron: "0 */30 * * * *"
  jwt:
    secret: ${JWT_SECRET}

langchain4j:
  open-ai:
    chat-model:
      base-url: https://api.siliconflow.cn/v1
      model-name: Qwen/Qwen2.5-7B-Instruct
      api-key: ${SILICON_FLOW_API_KEY:your-placeholder-key}
    embedding-model:
      base-url: https://api.siliconflow.cn/v1
      model-name: Qwen/Qwen3-Embedding-0.6B
      api-key: ${SILICON_FLOW_API_KEY:your-placeholder-key}

# Suppress Tomcat ERROR logs for broken SSE connections (client disconnect).
# These two loggers only fire when a servlet or error page write fails mid-flight,
# which is normal for long-lived SSE streams. WARN and above still pass through.
logging:
  level:
    "org.apache.catalina.core.ContainerBase.[Tomcat].[localhost].[/].[dispatcherServlet]": WARN
    "org.apache.catalina.core.ContainerBase.[Tomcat].[localhost]": WARN
