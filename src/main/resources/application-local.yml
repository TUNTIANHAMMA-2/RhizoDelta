# Local development profile
# Activate via: spring.profiles.active=local (IDEA run config or CLI)
spring:
  neo4j:
    uri: bolt://localhost:7687
    authentication:
      username: neo4j
      password: 12345678
  # 注意：rabbitmq 必须和 neo4j 完全对齐（前面只有2个空格）
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    virtual-host: /
  data:
    redis:
      host: localhost
      port: 6379

# rhizodelta 必须顶格写（前面没有空格）
rhizodelta:
  jwt:
    secret: rhizodelta_local_dev_super_secret_key_2026_spring_boot

langchain4j:
  open-ai:
    chat-model:
      api-key: ${SILICON_FLOW_API_KEY:}
      base-url: https://api.siliconflow.cn/v1
      model-name: Qwen/Qwen2.5-7B-Instruct
    embedding-model:
      api-key: ${SILICON_FLOW_API_KEY:}
      base-url: https://api.siliconflow.cn/v1
      model-name: Qwen/Qwen3-Embedding-0.6B
