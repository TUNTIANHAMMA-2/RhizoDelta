spring:
  neo4j:
    uri: bolt://localhost:7687
    authentication:
      username: neo4j
      password: 12345678

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    virtual-host: /
    listener:
      simple:
        auto-startup: false
      direct:
        auto-startup: false



rhizodelta:
  embedding:
    dimension: 1024
  ai:
    recall:
      top-k: 10
    rerank:
      top-n: 3
    context:
      max-lineage-depth: 2
      max-children-depth: 1
      max-provenance: 5
    reflection:
      max-attempts: 2
    budget:
      max-prompt-tokens: 8192
      max-latency-ms: 30000
    confidence:
      review-threshold: 0.65
    sweeper:
      batch-size: 50
      cron: "0 */30 * * * *"
  jwt:
    secret: test-jwt-secret-key-that-is-at-least-256-bits-long-for-hmac-sha256-signing


langchain4j:
  open-ai:
    chat-model:
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      model-name: deepseek-v4-flash
      api-key: test-api-key
    embedding-model:
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      model-name: text-embedding-v3
      api-key: test-api-key
