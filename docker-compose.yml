services:
  neo4j:
    image: neo4j:${NEO4J_IMAGE_TAG}
    container_name: ${NEO4J_CONTAINER_NAME}
    restart: unless-stopped
    ports:
      - "127.0.0.1:${NEO4J_HTTP_PORT}:7474"
      - "127.0.0.1:${NEO4J_BOLT_PORT}:7687"
    environment:
      NEO4J_AUTH: ${NEO4J_AUTH}
      NEO4J_server_memory_heap_initial__size: ${NEO4J_HEAP_INIT}
      NEO4J_server_memory_heap_max__size: ${NEO4J_HEAP_MAX}
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
  rabbitmq:
    image: rabbitmq:3-management
    container_name: ${RABBITMQ_CONTAINER_NAME:-rhizodelta-rabbitmq}
    restart: unless-stopped
    ports:
      - "127.0.0.1:${RABBITMQ_PORT:-5672}:5672"
      - "127.0.0.1:${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-guest}
  redis:
    image: redis:7-alpine
    container_name: ${REDIS_CONTAINER_NAME:-rhizodelta-redis}
    restart: unless-stopped
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
  minio:
    image: minio/minio:latest
    container_name: ${MINIO_CONTAINER_NAME:-rhizodelta-minio}
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "127.0.0.1:${MINIO_API_PORT:-9000}:9000"
      - "127.0.0.1:${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data

volumes:
  neo4j_data:
  neo4j_logs:
  minio_data:
