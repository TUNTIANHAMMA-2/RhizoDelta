services:
  neo4j:
    image: neo4j:${NEO4J_IMAGE_TAG}
    container_name: ${NEO4J_CONTAINER_NAME}
    restart: unless-stopped
    ports:
      - "127.0.0.1:${NEO4J_HTTP_PORT}:7474"
      - "127.0.0.1:${NEO4J_BOLT_PORT}:7687"
    environment:
      NEO4J_AUTH: ${NEO4J_AUTH}
      NEO4J_server_memory_heap_initial__size: ${NEO4J_HEAP_INIT}
      NEO4J_server_memory_heap_max__size: ${NEO4J_HEAP_MAX}
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
  rabbitmq:
    image: rabbitmq:3-management
    container_name: ${RABBITMQ_CONTAINER_NAME:-rhizodelta-rabbitmq}
    restart: unless-stopped
    ports:
      - "127.0.0.1:${RABBITMQ_PORT:-5672}:5672"
      - "127.0.0.1:${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-guest}

volumes:
  neo4j_data:
  neo4j_logs:
