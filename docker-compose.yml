services:
  neo4j:
    image: neo4j:${NEO4J_IMAGE_TAG}
    container_name: ${NEO4J_CONTAINER_NAME}
    restart: unless-stopped
    ports:
      - "127.0.0.1:${NEO4J_HTTP_PORT}:7474"
      - "127.0.0.1:${NEO4J_BOLT_PORT}:7687"
    environment:
      NEO4J_AUTH: ${NEO4J_AUTH}
      NEO4J_server_memory_heap_initial__size: ${NEO4J_HEAP_INIT}
      NEO4J_server_memory_heap_max__size: ${NEO4J_HEAP_MAX}
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    networks:
      - rhizodelta-net
  rabbitmq:
    image: rabbitmq:3-management
    container_name: ${RABBITMQ_CONTAINER_NAME:-rhizodelta-rabbitmq}
    restart: unless-stopped
    ports:
      - "127.0.0.1:${RABBITMQ_PORT:-5672}:5672"
      - "127.0.0.1:${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-guest}
    networks:
      - rhizodelta-net
  redis:
    image: redis:7-alpine
    container_name: ${REDIS_CONTAINER_NAME:-rhizodelta-redis}
    restart: unless-stopped
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    networks:
      - rhizodelta-net
  minio:
    image: minio/minio:latest
    container_name: ${MINIO_CONTAINER_NAME:-rhizodelta-minio}
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "127.0.0.1:${MINIO_API_PORT:-9000}:9000"
      - "127.0.0.1:${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    networks:
      - rhizodelta-net
  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: ${PROMETHEUS_CONTAINER_NAME:-rhizodelta-prometheus}
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    ports:
      - "127.0.0.1:${PROMETHEUS_PORT:-9090}:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - rhizodelta-net
  grafana:
    image: grafana/grafana:10.2.3
    container_name: ${GRAFANA_CONTAINER_NAME:-rhizodelta-grafana}
    restart: unless-stopped
    depends_on:
      - prometheus
    ports:
      - "127.0.0.1:${GRAFANA_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-changeme}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    networks:
      - rhizodelta-net

volumes:
  neo4j_data:
  neo4j_logs:
  minio_data:
  prometheus_data:
  grafana_data:

networks:
  rhizodelta-net:
    driver: bridge
