services:
  neo4j:
    image: neo4j:${NEO4J_IMAGE_TAG}
    container_name: ${NEO4J_CONTAINER_NAME}
    restart: unless-stopped
    ports:
      - "127.0.0.1:${NEO4J_HTTP_PORT}:7474"
      - "127.0.0.1:${NEO4J_BOLT_PORT}:7687"
    environment:
      NEO4J_AUTH: ${NEO4J_AUTH}
      NEO4J_server_memory_heap_initial__size: ${NEO4J_HEAP_INIT}
      NEO4J_server_memory_heap_max__size: ${NEO4J_HEAP_MAX}
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs

volumes:
  neo4j_data:
  neo4j_logs:
